name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: verify-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate version and changelog
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [ "${tag_version}" != "${crate_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${crate_version}" >&2
            exit 1
          fi

          awk -v version="${tag_version}" '
            BEGIN { found = 0 }
            /^## / {
              if (found) exit
              if ($2 == version) {
                found = 1
                next
              }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for ${tag_version}" >&2
            exit 1
          fi

          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: cargo test

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  build:
    name: build-${{ matrix.asset_name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: revi-macos-aarch64
            binary_name: revi
            archive_ext: tar.gz
            needs_target_install: false
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: revi-macos-x86_64
            binary_name: revi
            archive_ext: tar.gz
            needs_target_install: true
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: revi-linux-x86_64
            binary_name: revi
            archive_ext: tar.gz
            needs_target_install: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: revi-windows-x86_64
            binary_name: revi.exe
            archive_ext: zip
            needs_target_install: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install extra Rust target
        if: matrix.needs_target_install
        run: rustup target add ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          tar -czf "${{ matrix.asset_name }}.tar.gz" -C dist "${{ matrix.binary_name }}"

      - name: Package Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.asset_name }}.zip" -Force

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}

  publish:
    name: publish-release
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist/assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="Revi ${tag}"
          notes="dist/release-notes/release-notes.md"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file "${notes}"
          else
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file "${notes}"
          fi

          find dist/assets -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | while IFS= read -r -d '' file; do
            gh release upload "${tag}" "${file}" --repo "${GITHUB_REPOSITORY}" --clobber
          done
