name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cargo-test:
    name: cargo-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test
