[template]
id = "python-service"
kind = "python-service"
display_name = "Python Service / Agent"
description = "Python service scaffold with pytest checks and optional container release workflow."
version = "1.0.0"

[runtime]
default = "python3.11"

[commands]
install = "python3 -m pip install -e \".[dev]\""
start = "python src/main.py"
validate = "pytest -q"
release_prep = "pytest -q && docker build -t ghcr.io/<owner>/<repo>:latest ."
stack_specific = "Swap the placeholder service entrypoint for your framework of choice if you move beyond the generated smoke skeleton."

checks = ["python3 -m pip install -e \".[dev]\"", "pytest -q"]

[files]
static = [".gitignore"]

[[files.inline]]
path = "README.md"
content = """# {{project_name}}

{{project_description}}

## Template

- Kind: `{{template_kind}}`
- Runtime: `{{default_runtime}}`
- Version: `{{project_version}}`

## Git Workflow

- Stable branch: `main`
- Feature branches: `feat/<name>`
- Bugfix branches: `fix/<name>`
- Release blockers: `hotfix/<name>`
- Release tags: `vX.Y.Z`

## Commands

- Install: `{{commands.install}}`
- Start: `{{commands.start}}`
- Validate: `{{commands.validate}}`
- Release prep: `{{commands.release_prep}}`

## Release

- Container image publication via GHCR-compatible registry
- GitHub Release notes for deployment guidance

Release checklist:
1. Merge work back to `main`
2. Update version and `CHANGELOG.md`
3. Tag `{{release_tag_example}}`
4. Push `main` and the tag
"""

[[files.inline]]
path = "CONTRIBUTING.md"
content = """# Contributing

## Branching

- `main` is always intended to stay releasable
- use `feat/<topic>` for new work
- use `fix/<topic>` for bug fixes
- use `hotfix/<topic>` for release blockers

## Pull Requests

- keep changes scoped
- update docs when behavior changes
- include validation steps in the PR body

## Change Types Requiring Extra Care

- image/tagging changes
- deployment manifest edits
- model or toolchain behavior updates

## Release Flow

1. Land changes on `main`
2. Update versioned files together
3. Create a release commit if needed
4. Tag `vX.Y.Z`
5. Push `main` and the tag
"""

[[files.inline]]
path = "CHANGELOG.md"
content = """# Changelog

## 0.1.0 - TBD

- Initial scaffold generated by revi
"""

[[files.inline]]
path = "pyproject.toml"
content = """[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "{{project_slug}}"
version = "{{project_version}}"
description = "{{project_description}}"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8,<9"]

[tool.pytest.ini_options]
testpaths = ["tests"]
"""

[[files.inline]]
path = "src/__init__.py"
content = ""

[[files.inline]]
path = "src/main.py"
content = """def main() -> None:
    print("hello from {{project_name}}")


if __name__ == "__main__":
    main()
"""

[[files.inline]]
path = "tests/test_smoke.py"
content = """def test_smoke() -> None:
    assert True
"""

release_notes = ["Container images are published with latest and sha-* tags.", "Document deployment changes in the release notes."]
