[template]
id = "desktop-tauri"
kind = "desktop-tauri"
display_name = "Desktop / Tauri"
description = "Tauri desktop scaffold with multi-platform GitHub release workflow."
version = "1.0.0"

[runtime]
default = "node22 + rust"

[commands]
install = "npm install"
start = "npm run dev"
validate = "npm run ci"
release_prep = "npm run ci && npm run tauri build"
stack_specific = "Add signing, notarization, or updater setup before shipping production desktop builds."

checks = ["npm install", "npm run ci", "npm run tauri build"]

[files]
static = [".gitignore"]

[[files.inline]]
path = "README.md"
content = """# {{project_name}}

{{project_description}}

## Template

- Kind: `{{template_kind}}`
- Runtime: `{{default_runtime}}`
- Version: `{{project_version}}`

## Git Workflow

- Stable branch: `main`
- Feature branches: `feat/<name>`
- Bugfix branches: `fix/<name>`
- Release blockers: `hotfix/<name>`
- Release tags: `vX.Y.Z`

## Commands

- Install: `{{commands.install}}`
- Start: `{{commands.start}}`
- Validate: `{{commands.validate}}`
- Release prep: `{{commands.release_prep}}`

## Release

- Multi-platform desktop bundle release via GitHub Releases
- Tag-driven Tauri publish workflow

Release checklist:
1. Merge work back to `main`
2. Update version and `CHANGELOG.md`
3. Tag `{{release_tag_example}}`
4. Push `main` and the tag
"""

[[files.inline]]
path = "CONTRIBUTING.md"
content = """# Contributing

## Branching

- `main` is always intended to stay releasable
- use `feat/<topic>` for new work
- use `fix/<topic>` for bug fixes
- use `hotfix/<topic>` for release blockers

## Pull Requests

- keep changes scoped
- update docs when behavior changes
- include validation steps in the PR body

## Change Types Requiring Extra Care

- bundling/signing changes
- updater/package channel changes
- native capability or filesystem scope changes

## Release Flow

1. Land changes on `main`
2. Update versioned files together
3. Create a release commit if needed
4. Tag `vX.Y.Z`
5. Push `main` and the tag
"""

[[files.inline]]
path = "CHANGELOG.md"
content = """# Changelog

## 0.1.0 - TBD

- Initial scaffold generated by revi
"""

[[files.inline]]
path = "package.json"
content = """{
  "name": "{{project_slug}}",
  "version": "{{project_version}}",
  "private": true,
  "type": "module",
  "scripts": {
    "dev": "node src/main.js",
    "build": "node -e \\"const fs=require('node:fs'); fs.mkdirSync('dist', { recursive: true }); fs.writeFileSync('dist/index.html', '<!doctype html><html><body><h1>{{project_name}}</h1></body></html>');\\"",
    "test": "node -e \\"console.log('tauri smoke test placeholder')\\",
    "ci": "npm run build && npm run test",
    "tauri": "tauri"
  },
  "devDependencies": {
    "@tauri-apps/cli": "^2.0.0"
  }
}
"""

[[files.inline]]
path = "src/main.js"
content = """console.log('tauri frontend placeholder');
"""

[[files.inline]]
path = "dist/index.html"
content = """<!doctype html>
<html>
  <body>
    <h1>{{project_name}}</h1>
  </body>
</html>
"""

[[files.inline]]
path = "src-tauri/Cargo.toml"
content = """[package]
name = "{{project_slug}}-desktop"
version = "{{project_version}}"
edition = "2024"
build = "build.rs"

[dependencies]
tauri = { version = "2", features = [] }

[build-dependencies]
tauri-build = { version = "2", features = [] }
"""

[[files.inline]]
path = "src-tauri/build.rs"
content = """fn main() {
    tauri_build::build()
}
"""

[[files.inline]]
path = "src-tauri/src/main.rs"
content = """#![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]

fn main() {
    tauri::Builder::default()
        .run(tauri::generate_context!())
        .expect("error while running tauri application");
}
"""

[[files.inline]]
path = "src-tauri/tauri.conf.json"
content = """{
  "$schema": "https://schema.tauri.app/config/2",
  "productName": "{{project_name}}",
  "version": "{{project_version}}",
  "identifier": "com.example.{{project_slug}}",
  "build": {
    "beforeDevCommand": "npm run dev",
    "beforeBuildCommand": "npm run build",
    "frontendDist": "../dist"
  },
  "app": {
    "windows": [{ "title": "{{project_name}}", "width": 1200, "height": 800 }]
  },
  "bundle": {
    "active": true,
    "targets": "all"
  }
}
"""

release_notes = ["Desktop bundles are produced per platform matrix.", "Signing and notarization should be added before production release."]
