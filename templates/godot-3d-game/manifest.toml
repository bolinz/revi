[template]
id = "godot-3d-game"
kind = "godot-3d-game"
display_name = "3D Game / Godot"
description = "Godot 4.x 3D game scaffold with basic player controller, WASD movement, and mouse look"
version = "1.0.0"

[runtime]
default = "godot4"

[commands]
install = "echo 'Download Godot 4.x from https://godotengine.org'"
start = "godot --headless --path ."
validate = "godot --headless --path . --check-only"
release_prep = "godot --headless --path . --export-release linux"
stack_specific = "Configure export templates for target platforms (Windows, Mac, Linux, Web) in Project > Export"

checks = ["godot --headless --path . --check-only"]

[files]
static = [".gitignore"]

[[files.inline]]
path = "README.md"
content = """# {{project_name}}

{{project_description}}

## Template

- Kind: `{{template_kind}}`
- Engine: `Godot 4.x`
- Version: `{{project_version}}`

## Requirements

- [Godot 4.x](https://godotengine.org/download) installed on your system
- Added to PATH for CLI access (optional)

## Quick Start

1. Open Godot 4.x editor
2. Click **Import** and select the `project.godot` file in this directory
3. Press **F5** to run the project

## Commands

| Action | Command |
|--------|---------|
| Open in Editor | `godot --path .` |
| Run Headless | `godot --headless --path .` |
| Validate Project | `godot --headless --path . --check-only` |
| Export (Linux) | `godot --headless --path . --export-release linux` |

## Project Structure

```
{{project_slug}}/
├── project.godot          # Godot project configuration
├── scenes/                # Game scenes (.tscn files)
│   ├── main.tscn          # Main entry scene
│   ├── player.tscn        # Player character
│   └── world.tscn         # Environment/floor
├── scripts/               # GDScript files
│   ├── main.gd           # Main scene logic
│   └── player.gd         # Player controller
└── exports/              # Exported builds (after export)
```

## Controls

| Input | Action |
|-------|--------|
| W / A / S / D | Move forward / left / back / right |
| Mouse | Look around (camera rotation) |
| Space | Jump |
| Shift | Sprint |

## Git Workflow

- Stable branch: `main`
- Feature branches: `feat/<name>`
- Bugfix branches: `fix/<name>`
- Release blockers: `hotfix/<name>`
- Release tags: `vX.Y.Z`

## Next Steps

1. Replace placeholder assets with your game art
2. Extend the player controller with more mechanics
3. Add enemies, items, and game systems
4. Configure export templates for target platforms
5. Set up scene transitions and UI

## Release

1. Merge work back to `main`
2. Update version and `CHANGELOG.md`
3. Export for target platforms: `godot --headless --path . --export-release <platform>`
4. Tag `vX.Y.Z`
5. Push `main` and the tag
"""

[[files.inline]]
path = "CONTRIBUTING.md"
content = """# Contributing

## Branching

- `main` is always intended to stay releasable
- Use `feat/<topic>` for new work
- Use `fix/<topic>` for bug fixes
- Use `hotfix/<topic>` for release blockers

## Pull Requests

- Keep changes scoped to one feature or fix
- Update documentation when behavior changes
- Test in Godot editor before submitting
- Include validation output in the PR body

## Change Types Requiring Extra Care

- Changes to `project.godot` (engine configuration)
- Export template changes
- Scene structure changes that may break existing saves
- Input map changes

## Release Flow

1. Land changes on `main`
2. Update version and `CHANGELOG.md`
3. Export for all target platforms
4. Create a release commit if needed
5. Tag `vX.Y.Z`
6. Push `main` and the tag
"""

