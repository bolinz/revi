[[files.inline]]
path = "scripts/player.gd"
content = """extends CharacterBody3D

## Basic 3D Player Controller
## Controls: WASD to move, Mouse to look, Space to jump, Shift to sprint

@export var move_speed: float = 5.0
@export var sprint_multiplier: float = 2.0
@export var jump_force: float = 10.0
@export var gravity: float = 20.0

var _velocity: Vector3 = Vector3.ZERO
var _is_sprinting: bool = false

func _physics_process(delta):
	# Apply gravity
	if not is_on_floor():
		_velocity.y -= gravity * delta

	# Get movement input
	var input_dir = Vector3.ZERO

	if Input.is_action_pressed("move_forward"):
		input_dir.z -= 1
	if Input.is_action_pressed("move_backward"):
		input_dir.z += 1
	if Input.is_action_pressed("move_left"):
		input_dir.x -= 1
	if Input.is_action_pressed("move_right"):
		input_dir.x += 1

	# Normalize diagonal movement
	if input_dir.length() > 0:
		input_dir = input_dir.normalized()

	# Transform direction relative to player facing
	var world_dir = transform.basis * input_dir

	# Calculate speed (sprint if holding sprint key while moving forward)
	_is_sprinting = Input.is_action_pressed("sprint") and input_dir.z < 0
	var current_speed = move_speed * sprint_multiplier if _is_sprinting else move_speed

	# Apply horizontal movement
	_velocity.x = world_dir.x * current_speed
	_velocity.z = world_dir.z * current_speed

	# Jump
	if Input.is_action_just_pressed("jump") and is_on_floor():
		_velocity.y = jump_force

	# Move the character
	move_and_slide()

func _process(_delta):
	# Optional: Add head bob or other effects here
	pass
"""

