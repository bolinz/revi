[[files.inline]]
path = "scripts/main.gd"
content = """extends Node3D

@onready var player = $Player
@onready var camera = $Camera3D

func _ready():
	# Lock and hide the mouse cursor for FPS-style controls
	Input.mouse_mode = Input.MOUSE_MODE_CAPTURED

func _input(event):
	# Handle mouse movement for camera rotation
	if event is InputEventMouseMotion and Input.mouse_mode == Input.MOUSE_MODE_CAPTURED:
		# Horizontal rotation applied to player
		player.rotate_y(-event.relative.x * 0.01)
		# Vertical rotation applied to camera (clamped)
		camera.rotate_x(-event.relative.y * 0.01)
		camera.rotation.x = clamp(camera.rotation.x, -PI/2, PI/2)

	# Press Escape to release mouse
	if event is InputEventKey and event.pressed and event.keycode == KEY_ESCAPE:
		if Input.mouse_mode == Input.MOUSE_MODE_CAPTURED:
			Input.mouse_mode = Input.MOUSE_MODE_VISIBLE
		else:
			Input.mouse_mode = Input.MOUSE_MODE_CAPTURED
"""

