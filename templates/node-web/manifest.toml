[template]
id = "node-web"
kind = "node-web"
display_name = "Node / Web"
description = "Node-based web scaffold with CI checks and tag-driven GitHub release placeholder."
version = "1.0.0"

[runtime]
default = "node22"

[commands]
install = "npm install"
start = "npm run dev"
validate = "npm run ci"
release_prep = "npm run ci"
stack_specific = "Wire hosting or deployment commands into the release workflow after choosing your target platform."

checks = ["npm install", "npm run ci"]

[files]
static = [".gitignore"]

[[files.inline]]
path = "README.md"
content = """# {{project_name}}

{{project_description}}

## Template

- Kind: `{{template_kind}}`
- Runtime: `{{default_runtime}}`
- Version: `{{project_version}}`

## Git Workflow

- Stable branch: `main`
- Feature branches: `feat/<name>`
- Bugfix branches: `fix/<name>`
- Release blockers: `hotfix/<name>`
- Release tags: `vX.Y.Z`

## Commands

- Install: `{{commands.install}}`
- Start: `{{commands.start}}`
- Validate: `{{commands.validate}}`
- Release prep: `{{commands.release_prep}}`

## Release

- GitHub Actions validation
- Release workflow placeholder for platform deployment handoff

Release checklist:
1. Merge work back to `main`
2. Update version and `CHANGELOG.md`
3. Tag `{{release_tag_example}}`
4. Push `main` and the tag
"""

[[files.inline]]
path = "CONTRIBUTING.md"
content = """# Contributing

## Branching

- `main` is always intended to stay releasable
- use `feat/<topic>` for new work
- use `fix/<topic>` for bug fixes
- use `hotfix/<topic>` for release blockers

## Pull Requests

- keep changes scoped
- update docs when behavior changes
- include validation steps in the PR body

## Change Types Requiring Extra Care

- build pipeline changes
- hosting/runtime configuration changes
- public API contract changes

## Release Flow

1. Land changes on `main`
2. Update versioned files together
3. Create a release commit if needed
4. Tag `vX.Y.Z`
5. Push `main` and the tag
"""

[[files.inline]]
path = "CHANGELOG.md"
content = """# Changelog

## 0.1.0 - TBD

- Initial scaffold generated by revi
"""

[[files.inline]]
path = "package.json"
content = """{
  "name": "{{project_slug}}",
  "version": "{{project_version}}",
  "private": true,
  "type": "module",
  "scripts": {
    "dev": "node src/index.js",
    "build": "node -e \\"const fs=require('node:fs'); fs.mkdirSync('dist', { recursive: true }); fs.writeFileSync('dist/index.html', '<!doctype html><html><body><h1>{{project_name}}</h1></body></html>');\\"",
    "test": "node --test tests/*.test.mjs",
    "ci": "npm run build && npm run test"
  }
}
"""

[[files.inline]]
path = "src/index.js"
content = """console.log('hello from {{project_name}}');
"""

[[files.inline]]
path = "dist/index.html"
content = """<!doctype html>
<html>
  <body>
    <h1>{{project_name}}</h1>
  </body>
</html>
"""

[[files.inline]]
path = "tests/smoke.test.mjs"
content = """import test from 'node:test';
import assert from 'node:assert/strict';

test('smoke', () => {
  assert.equal(1 + 1, 2);
});
"""

release_notes = ["GitHub Release is created from v* tags.", "Connect the release to your target hosting platform."]
