[template]
id = "generic-project"
kind = "generic-project"
display_name = "Generic / Bring Your Own Stack"
description = "Language-agnostic project scaffold with repo conventions, docs, and placeholder CI and release hooks."
version = "1.0.0"

[runtime]
default = "custom"

[commands]
install = "echo 'Choose your runtime first, then add the install command here.'"
start = "echo 'Choose a stack-specific start command after selecting your language or framework.'"
validate = "echo 'Replace this with your chosen test or validation command.'"
release_prep = "echo 'Replace placeholder validation and packaging steps before cutting a release.'"
stack_specific = "This template is intentionally stack-agnostic. Define install, run, test, build, and publish commands once the stack is chosen."

checks = ["Define your stack-specific checks in README and CI"]

[files]
static = [".gitignore", "src/.gitkeep", "docs/.gitkeep"]

[[files.inline]]
path = "README.md"
content = """# {{project_name}}

{{project_description}}

## Template

- Kind: `{{template_kind}}`
- Runtime: `{{default_runtime}}`
- Version: `{{project_version}}`

## Git Workflow

- Stable branch: `main`
- Feature branches: `feat/<name>`
- Bugfix branches: `fix/<name>`
- Release blockers: `hotfix/<name>`
- Release tags: `vX.Y.Z`

## Next Steps

1. Choose the primary language or framework for this repository.
2. Replace the placeholder CI and release commands with stack-specific validation and packaging.
3. Update `README.md` and `CONTRIBUTING.md` once the stack is decided.

## Release

- Source-first GitHub Release by default
- Add stack-specific build or publish steps after choosing a language or framework
"""

[[files.inline]]
path = "CONTRIBUTING.md"
content = """# Contributing

## Branching

- `main` is always intended to stay releasable
- use `feat/<topic>` for new work
- use `fix/<topic>` for bug fixes
- use `hotfix/<topic>` for release blockers

## Pull Requests

- keep changes scoped
- update docs when behavior changes
- include validation steps in the PR body

## Release Flow

1. Land changes on `main`
2. Update versioned files together
3. Create a release commit if needed
4. Tag `vX.Y.Z`
5. Push `main` and the tag
"""

[[files.inline]]
path = "CHANGELOG.md"
content = """# Changelog

## 0.1.0 - TBD

- Initial scaffold generated by revi
"""

release_notes = ["GitHub Release is created from v* tags.", "Add stack-specific build and packaging steps after choosing your language or framework."]
